<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>reviews</title>
    <!-- font-awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"
    />

    <!-- styles -->
    <link rel="stylesheet" href="../css/style-1.css" />
  </head>
  <body>
  <main>
    <section class="container">
      <!--titulo-->
      <div class="title">
        <h2>Nuestras reseñas</h2>
        <div class="underline"></div>
      </div>
      <!--reseña-->
      <article class="review">
        <div class="img-container">
          <img src="./person-1.jpeg" id="person-img" alt="">
        </div>
        <h4 id="author">Pepita</h4>
        <p id="job">ux designer</p>
        <p id="info">Lorem ipsum dolor sit amet consectetur adipisicing elit. Perferendis, eligendi ducimus exercitationem, quidem voluptas officia animi ipsa officiis ea distinctio magni? Distinctio ipsam dolores quisquam. Vitae assumenda debitis autem omnis?</p>
        <!--prev next buttons-->
        <div class="button-container">
          <button class="prev-btn">
            <i class="fas fa-chevron-left"></i>
          </button>
          <button class="next-btn">
            <i class="fas fa-chevron-right"></i>
          </button>
        </div>
        <!--random button-->
        <button class="random-btn">
          sorprendeme
        </button>
        <button class="random-btn">
          <a href="../index.html">volver</a>
        </button>
      </article>
    </section>
  </main>
    <!-- javascript -->
    <script src="../js/reviews.js"></script>
  </body>
</html>
